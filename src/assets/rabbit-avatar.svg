<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#E8F5E9"/>

  <!-- Left ear -->
  <ellipse cx="65" cy="45" rx="18" ry="42" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <ellipse cx="65" cy="45" rx="10" ry="32" fill="#FFB6C1"/>

  <!-- Right ear -->
  <ellipse cx="135" cy="45" rx="18" ry="42" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <ellipse cx="135" cy="45" rx="10" ry="32" fill="#FFB6C1"/>

  <!-- Head -->
  <ellipse cx="100" cy="110" rx="55" ry="50" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Left eye -->
  <ellipse cx="80" cy="100" rx="8" ry="9" fill="#2C2C2C"/>
  <ellipse cx="83" cy="97" rx="3" ry="3.5" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="120" cy="100" rx="8" ry="9" fill="#2C2C2C"/>
  <ellipse cx="123" cy="97" rx="3" ry="3.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="100" cy="118" rx="5" ry="4" fill="#FFB6C1"/>

  <!-- Mouth -->
  <path d="M93 123 Q100 132 107 123" fill="none" stroke="#2C2C2C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="122" x2="100" y2="126" stroke="#2C2C2C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left whisker -->
  <line x1="45" y1="112" x2="78" y2="116" stroke="#BDBDBD" stroke-width="1" stroke-linecap="round"/>
  <line x1="47" y1="120" x2="78" y2="120" stroke="#BDBDBD" stroke-width="1" stroke-linecap="round"/>

  <!-- Right whisker -->
  <line x1="122" y1="116" x2="155" y2="112" stroke="#BDBDBD" stroke-width="1" stroke-linecap="round"/>
  <line x1="122" y1="120" x2="153" y2="120" stroke="#BDBDBD" stroke-width="1" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="70" cy="118" rx="10" ry="6" fill="#FFB6C1" opacity="0.3"/>
  <ellipse cx="130" cy="118" rx="10" ry="6" fill="#FFB6C1" opacity="0.3"/>
</svg>